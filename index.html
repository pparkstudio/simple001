<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 생성기</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <header>
      <h1>로또 번호 생성기</h1>
      <button id="theme-toggle" aria-label="테마 전환">다크 모드</button>
    </header>
    <main>
      <div class="number-display">
        <span class="number"></span>
        <span class="number"></span>
        <span class="number"></span>
        <span class="number"></span>
        <span class="number"></span>
        <span class="number"></span>
      </div>
      <button id="generate-btn">번호 생성하기</button>
    </main>
    <section class="partnership-section">
      <h3>제휴 문의</h3>
      <form action="https://formspree.io/f/mwvavdrb" method="POST">
        <div class="form-group">
          <label for="name">이름</label>
          <input type="text" id="name" name="name" placeholder="이름을 입력하세요" required>
        </div>
        <div class="form-group">
          <label for="email">이메일</label>
          <input type="email" id="email" name="email" placeholder="email@example.com" required>
        </div>
        <div class="form-group">
          <label for="phone">연락처</label>
          <input type="tel" id="phone" name="phone" placeholder="010-0000-0000">
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" placeholder="문의 내용을 입력하세요" required></textarea>
        </div>
        <button type="submit" id="submit-btn" disabled>문의하기</button>
      </form>
    </section>
    <section class="comments-section">
      <div id="disqus_thread"></div>
      <script>
          /**
          *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
          *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
          /*
          var disqus_config = function () {
          this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
          this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
          };
          */
          (function() { // DON'T EDIT BELOW THIS LINE
          var d = document, s = d.createElement('script');
          s.src = 'https://simple001.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
          })();
      </script>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>
    <footer>
      <p>행운을 빕니다!</p>
    </footer>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
